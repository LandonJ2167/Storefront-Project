<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Flask App {% endblock %}</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<!-- Sidebar Top -->
<body class="flex flex-col h-screen w-full bg-gray-500">
    <div class="flex w-full h-20 bg-gray-500 shrink-0 items-center">
        <div class="flex items-center justify-center h-20 bg-gray-500 p-5">
            <span class="text-black font-bold text-center text-2xl">
                <a href="/">Store Name</a>
                
            </span>
        </div>
        <div class="flex items-center ml-auto space-x-4">
            <nav class="flex w-full items-center justify-between px-4 bg-gray-500">

                <!-- Sidebar Items -->
                <a href="/products"
                    class="flex items-center px-4 py-2 mr-4 text-black hover:bg-gray-700 rounded {{ 'underline' if request.path == '/' else '' }}">
                    
                    <p>Products</p>
                </a>

                    <a href="/login"
                        class="flex items-center px-4 py-2 mr-4 text-black hover:bg-gray-700 rounded {{ 'underline' if request.path == '/' else '' }}">
                        Login
                    </a>

                    <a href="/register"
                        class="flex items-center px-4 py-2 mr-4 text-black hover:bg-gray-700 rounded {{ 'underline' if request.path == '/' else '' }}">
                        Register
                    </a>
                
            </nav>
        </div>
    </div>

    <!-- Main content -->
    <div class="flex-1 bg-gray-50 overflow-y-auto text-black">
        {% block content %}

        {% endblock %}
    </div>

</body>

</html>
